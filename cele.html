<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Цілі</title>
<style>
body { font-family: Arial; background:#111; color:#fff; padding:20px; }
.card { background:#222; padding:15px; border-radius:10px; margin-bottom:10px; }
button { padding:10px; margin-top:10px; cursor:pointer; }
.done { opacity:0.5; text-decoration:line-through; }
</style>
</head>
<body>

<h2>Мої цілі</h2>
<div id="list"></div>

<script>
let goals = [
  {
    id: 1,
    title: 'Аналізи',
    type: 'checklist',
    done: false,
    subtasks: [
      { id: 1, text: 'Загальний аналіз крові', done: false },
      { id: 2, text: 'Гормони щитовидки', done: false },
      { id: 3, text: 'УЗД', done: false },
      { id: 4, text: 'Візит до лікаря', done: false }
    ]
  },
  {
    id: 2,
    title: 'Відпочити мінімум 4 рази',
    type: 'counter',
    done: false,
    current: 0,
    target: 4
  }
];

function render() {
  const el = document.getElementById('list');
  el.innerHTML = '';

  goals.forEach(g => {
    const div = document.createElement('div');
    div.className = 'card ' + (g.done ? 'done' : '');

    if (g.type === 'checklist') {
      div.innerHTML = `<b>${g.title}</b><br>` +
        g.subtasks.map(s =>
          `<div>
            <input type="checkbox" ${s.done?'checked':''}
              onchange="toggleSub(${g.id},${s.id})">
            ${s.text}
          </div>`
        ).join('');
    }

    if (g.type === 'counter') {
      div.innerHTML = `<b>${g.title}</b><br>
        ${g.current} / ${g.target}<br>
        <button onclick="add(${g.id})">+1</button>`;
    }

    el.appendChild(div);
  });
}

function toggleSub(goalId, subId) {
  const g = goals.find(x=>x.id===goalId);
  const s = g.subtasks.find(x=>x.id===subId);
  s.done = !s.done;

  if (g.subtasks.every(x=>x.done)) g.done = true;
  else g.done = false;

  render();
}

function add(id) {
  const g = goals.find(x=>x.id===id);
  g.current++;
  if (g.current >= g.target) g.done = true;
  render();
}

render();
</script>

</body>
</html></html>
